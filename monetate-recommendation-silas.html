<!-- Rec Strategy A: Purchase and Also Purchased -->

<!-- Slider Template -->
<!-- Html template to build grid. -->
<h2 class="mt-header"> Customers Also Bought </h2>
<div class="mt-accordion" id="fbt-rec">
  <div class="mt-accordion-item expanded">
    <div class="mt-accordion-header">
    </div>
    <div class="mt-accordion-content"> {{SLIDER}}</div>
  </div>
</div>


<!-- Item Template -->
<!-- * Html template to build merch items. -->
<a class="mt-link" href="{{childLink}}" rel="nofollow" data-pid="{{id}}" data-omni="pdp_rec_db_app_mensbcgclothing">
  <% if (badge!=null) {%>
    <div class="mt-badge" data-badge="{{badge}}">{{badge}}</div>
    <% } %>
      <img class="mt-image" src="{{imageLink}}" alt="{{id}} - {{title}}">
      <% if (rating !='0' && reviewCount !='0' ) { %>
        <div class="mt-product-review">
          <div class="mt-star-rating">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M5.50038 7.81182L8.59017 9.71765L7.7721 6.12206L10.5 3.70438L6.90344 3.38922L5.50038 0L4.0958 3.38922L0.5 3.70586L3.2279 6.12355L2.40984 9.71914L5.50038 7.81182Z"
                fill="#F2CF56" />
            </svg>
            {{rating}} ({{reviewCount}})
          </div>
        </div>
        <% } else { %>
          <div class="mt-product-review">
            <div class="mt-star-rating">
              &nbsp;
            </div>
          </div>
          <% } %>
            <div class="mt-title">{{title}}</div>
            <div class="mt-prices">
              <span class="mt-sale-price">{{salePrice|priceFormat: $1,000.00}}</span>
              <span class="mt-price">{{price|priceFormat: $1,000.00}}</span>
            </div>
</a>
<a href="{{childLink}}" rel="nofollow" data-omni="pdp_rec_db_app_mensbcgclothing" class="mt-button" data-pid="{{id}}"
  data-brand="{{ brand }}" data-product-type="{{ productType2 }}" data-parentsku="{{ itemGroupId }}"
  data-childsku="{{id}}" data-productid="{{productId}}">
  Add To Cart
</a>

<style>
  /** MAIN CONTAINER **/
  #MONETATE-ID {
    position: relative;
    text-align: center;
    margin: 20px 0px;
    border: 1px solid #CCCCCC;
    padding: 15px 0 0;
    border-radius: 4px;
  }


  /** SLIDER MASK TO HIDE ITEMS OUTSIDE OF IT **/
  #MONETATE-ID [data-slider-mask] {
    overflow: hidden;
    /* otherwise it's not a mask */
    width: 100%;
    position: relative;
  }

  /** SLIDER CONTAINING ALL ELEMENTS **/
  #MONETATE-ID [data-slider] {
    display: flex;
    flex: auto;
    overflow-x: auto;
    flex-wrap: nowrap;
    transform: none !important;
    margin: 0;
    padding: 30px 0 15px 0;
    overflow-y: hidden;
  }

  #MONETATE-ID [data-slider]::-webkit-scrollbar-thumb {
    background-color: #b2b2b2;
    border-radius: 3px;
  }

  #MONETATE-ID [data-slider]::-webkit-scrollbar-track {
    background-color: #fff;
  }

  #MONETATE-ID [data-slider]::-webkit-scrollbar {
    height: 3px;
  }

  /** INDIVIDUAL SLIDES **/
  #MONETATE-ID [data-slide] {
    display: inline-flex !important;
    list-style: none;
    white-space: nowrap;
    width: 119.5px !important;
    flex: 0 0 calc(100% / 4);
    padding: 0 15px;
  }

  #MONETATE-ID .mt-header {
    font-family: Poppins;
    font-size: 20px;
    font-weight: 700;
    line-height: 19.55px;
    text-align: center;
    color: #003366;
    text-transform: uppercase;
  }

  #MONETATE-ID [data-slide] .mt-link {
    text-decoration: none;
    /* no underline */
    display: block;
  }

  #MONETATE-ID [data-slide] .mt-image {
    width: 88px;
    height: 88px;
  }

  #MONETATE-ID .mt-title {
    font-family: Poppins;
    font-size: 12px;
    font-weight: 600;
    line-height: 16px;
    text-align: left;
    color: #333333;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    height: 50px;
    max-width: 96px;
    white-space: normal;
  }

  #MONETATE-ID .mt-prices {
    font-family: Poppins;
    font-size: 12px;
    font-weight: 600;
    line-height: 14.58px;
    text-align: left;
    color: #003366;
    margin-top: 10px;
    margin-bottom: 20px;
  }

  #MONETATE-ID .mt-price {
    text-decoration: line-through;
    /* strikethrough price */
    font-family: Poppins;
    font-size: 12px;
    font-weight: 600;
    line-height: 14.58px;
    text-align: left;
    color: #666666;
    margin-left: 8px;
  }

  #MONETATE-ID .mt-sale-price {
    font-family: Poppins;
    font-size: 12px;
    font-weight: 600;
    line-height: 14.58px;
    text-align: left;
    color: #D60000;
  }

  #MONETATE-ID [data-missing-keys*="salePrice"] .mt-price {
    text-decoration: none;
    /* don't strikeththrough if there's no sale price */
    color: #003366;
    margin-left: 0;
  }


  /** NEXT AND PREVIOUS BUTTONS **/
  #MONETATE-ID [data-prev-button],
  #MONETATE-ID [data-next-button] {
    position: absolute;
    top: 45%;
    /* kind of in the middle. Tweak if big image or icon */
    font-size: 25px;
    /* make it big if there's no image */
    cursor: pointer;
    /* we want the pointer */
    z-index: 1;
    /* above the rest of the slider */
    color: #000;
    outline: 0;
    /* we use a button for accessibility, but we don't want button styling */
    border: 0;
    width: 50px;
    /* set the width in case the image is big */
  }

  #MONETATE-ID [data-prev-button] img,
  #MONETATE-ID [data-next-button] img {
    position: absolute;
    /* put the image above any text if the is one */
    top: 0;
    left: 0;
    width: 100%;
  }

  #MONETATE-ID [data-prev-button][disabled],
  #MONETATE-ID [data-next-button][disabled] {
    opacity: 0.5;
    /* show the disabled buttons with opacity */
  }

  #MONETATE-ID [data-prev-button] {
    left: 0;
    /* position the buttons */
  }

  #MONETATE-ID [data-next-button] {
    right: 0;
    /* position the buttons */
  }

  /** PAGINATION DOTS **/
  #MONETATE-ID ul[data-pagination] {
    margin: 30px 0 0 0;
    display: flex;
    background: #C2C2C2;
    height: 3px;
    width: 100%;
    cursor: pointer;
    padding: 0;
    visibility: hidden;
  }

  #MONETATE-ID [data-pagination-slide] {
    height: 2px;
    text-indent: -9999px;
    /* hide the text. Remove for numbers */
    flex-grow: 1;
    height: 3px;
    background: #B2B2B2;
    list-style: none;
    opacity: 0;
  }

  #MONETATE-ID [data-pagination-slide][data-slide-active] {
    opacity: 1;
    /* show full when active */
  }

  #MONETATE-ID[data-slider-wrapper="fade"] [data-slide][data-slide-active] {
    position: relative;
    z-index: 1;
    opacity: 1;
  }

  /**
 * VERTICAL, FADE AND THUMBNAIL PAGINATION
 */
  #MONETATE-ID[data-slider-wrapper="vertical"] [data-slider-mask] {
    touch-action: auto;
    height: auto;
  }

  #MONETATE-ID[data-slider-wrapper="fade"] [data-slider-mask] {
    position: relative;
  }

  #MONETATE-ID[data-slider-wrapper="vertical"] [data-slider],
  #MONETATE-ID[data-slider-wrapper="fade"] [data-slider] {
    white-space: normal;
  }

  #MONETATE-ID[data-slider-wrapper="vertical"] [data-slide],
  #MONETATE-ID[data-slider-wrapper="fade"] [data-slide] {
    display: block;
    vertical-align: baseline;
    height: auto !important;
    position: relative;
  }

  #MONETATE-ID[data-slider-wrapper="fade"] [data-slide] {
    position: absolute;
    top: 0;
    opacity: 0;
  }

  #MONETATE-ID[data-slider-wrapper="fade"] [data-slide][data-slide-active] {
    position: relative;
    z-index: 1;
    opacity: 1;
  }

  #MONETATE-ID[data-slider-wrapper="vertical"] [data-prev-button] {
    top: 0;
    left: 50%;
    transform: translateX(-33%);
  }

  #MONETATE-ID[data-slider-wrapper="vertical"] [data-next-button] {
    top: auto;
    bottom: 0;
    left: 50%;
    right: auto;
    transform: translateX(-33%);
  }

  #MONETATE-ID [data-pagination="thumbnails"] [data-pagination-slide] {
    border-radius: 0;
    background: none;
    width: 40px;
    height: auto;
    text-indent: 0;
  }

  #MONETATE-ID .mt-star-rating {
    display: inline-block;
    position: relative;
    height: 22px;
    color: #0255CC;
  }

  #MONETATE-ID .mt-blankstar {
    height: 22px;
    display: inline-block;
    width: 100%;
  }

  #MONETATE-ID .mt-star-rating .mt-fillstar {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    overflow: hidden;
    white-space: nowrap;
  }

  #MONETATE-ID .mt-star-rating svg {
    display: inline-block;
  }

  #MONETATE-ID .mt-review {
    display: inline-block;
  }

  #MONETATE-ID .mt-product-review {
    margin-top: 10px;
    font-family: Poppins;
    font-size: 12px;
    font-weight: 600;
    line-height: 14.4px;
    text-align: left;
  }

  #MONETATE-ID .mt-button {
    font-family: Poppins;
    font-size: 14px;
    font-weight: 600;
    line-height: 16.8px;
    background: transparent;
    color: #0066CC;
    padding: 6px 10px 6px 10px;
    border-radius: 4px;
    border: 1px solid #0066CC;
    display: block;
    margin: 0;
  }

  #MONETATE-ID .mt-badge[data-badge='hot deal'] {
    background: #D60000 !important;
    color: #ffff !important;
    border-color: #D60000 !important;
    padding: 4px 8px;
    letter-spacing: 0.05rem;
  }

<script>

  /* eslint-disable require-jsdoc */
  /* eslint-disable camelcase */
  /* eslint-disable no-unused-vars */
  waitFor(function () {
    return true;
  }, attachEvents)();
  if (
    document.querySelectorAll(
      '.lc-prsc-container-template-2 .tops-lc-prsc-content-template-2'
    ).length
  ) {
    // console.log('input0: ', input0);
    // trackVisibleProducts(input0);
  }
  /**
     * Extracts product details from the element
     * @param {Element} item - DOM element with product (link element)
     * @return {{
     *  price: string,
     *  name: string,
     *  id: string,
     *  position: number,
     *  category: string,
     *  brand: string,
     *  list: string
     * }}
     * product details
     */
  function extractProductDetails(item) {
    var el = item;
    var slide = el.closest('li');
    var container = el.closest('div[id^="mt-slider"]');
    var list = container.querySelector('h2').textContent;
    var name = el
      .querySelector('[data-product-name]')
      .getAttribute('data-product-name');
    var category = el.getAttribute('data-product-type').split('|').pop().trim();
    var id = el.getAttribute('data-item-group-id');
    var brand = el.getAttribute('data-brand');
    var priceNode = el.querySelector('[data-price]');
    var salePriceNode = el.querySelector('[data-sale-price]');
    var price =
      salePriceNode.getAttribute('data-sale-price') ||
      priceNode.getAttribute('data-price');
    var position = slide.getAttribute('data-slide') * 1 + 1;
    return {
      name: name,
      id: id,
      price: price,
      brand: brand,
      category: category,
      position: position,
      list: list,
    };
  }
  /**
     * Adds event for clicking on product and slider buttons
     * @return {void}
     */
  function attachEvents() {
    const anchorLinks = document.querySelectorAll(
      'a.mt-button'
    );
    anchorLinks.forEach((anchorLink) => {
      anchorLink.addEventListener('click', (e) => {
        e.preventDefault();

        const parent_sku = e.currentTarget.getAttribute('data-parentsku');
        const child_sku = e.currentTarget.getAttribute('data-childsku');
        const product_id = e.currentTarget.getAttribute('data-productid');


        window.launchASOQuickView({
          item: {
            other_client_item_ids: {
              identifiers: {
                parent_sku: parent_sku,
                catentry_id: product_id,
                sku: child_sku,
                skus: [child_sku],
              },
            },
            sku: child_sku,
            skus: [child_sku],
          },
        });
      });
    });
  }
  /**
     * Handles click on product in slider
     * @param {Element} el - product link element
     * @return {void}
     */
  function handleProductClickEvent(el) {
    var product = extractProductDetails(el.target.closest('a'));
    sendProductClickEvent(
      product.name,
      product.id,
      product.price,
      product.brand,
      product.category,
      product.position,
      product.list
    );
  }
  /**
     * Tracks product from vieweport
     * @param {Integer} input0
     * @return {void}
     */
  function trackVisibleProducts(input0) {
    var products = getVisibleProducts(input0);
    var impressions = [];
    for (var i = 0; i < products.length; i += 1) {
      var details = extractProductDetails(products[i]);
      impressions.push({
        name: details.name,
        id: details.id,
        price: details.price,
        brand: details.brand,
        category: details.category,
        list: details.list,
        position: details.position,
      });
    }
    sendVisibleProductsEvent(impressions);
  }
  /**
     * Sends event with visible products
     * @param {Array<Object>} impressions - list of products in view port
     * @return {void}
     */
  function sendVisibleProductsEvent(impressions) {
    setTimeout(
      () => {
        if (window.dataLayer && window.dataLayer.push) {
          window.dataLayer.push({
            ecommerce: {
              currencyCode: 'USD',
              impressions: impressions,
            },
          });
        }
      },
      2000,
      impressions
    );
  }

  /**
     * Sends event with selected products
     * @param {string} name - product name
     * @param {string} id - product id
     * @param {string} price - product price
     * @param {string} brand - product brand
     * @param {string} category - product category
     * @param {number} position - product position
     * @param {string} title - recommendations title
     * @return {void}
     */
  function sendProductClickEvent(
    name,
    id,
    price,
    brand,
    category,
    position,
    title
  ) {
    if (window.dataLayer && window.dataLayer.push) {
      window.dataLayer.push({
        event: 'productClick',
        ecommerce: {
          click: {
            actionField: { list: 'listname' },
            products: [
              {
                name: name,
                id: id,
                price: price,
                brand: brand,
                category: category,
                list: title,
                position: position,
              },
            ],
          },
        },
      });
    }
  }

  /**
     * Validates if element visible on the page
     * @param {Element} el - DOM element to validate
     * @return {boolean} - true if element visible on the page
     */
  function isElementInViewport(el) {
    var rect = el.getBoundingClientRect();
    return (
      rect.top >= 0 &&
      rect.left >= 0 &&
      rect.left <= (window.innerWidth || document.documentElement.clientWidth)
    );
  }
  /**
     * Collects list of visible products
     * @param {Integer} input0
     * @return {Array} - list of elements
     */
  function getVisibleProducts(input0) {
    var actionId = input0.id;
    return [...document.querySelectorAll('#' + actionId + ' li[data-slide]')]
      .filter(function (el) {
        return isElementInViewport(el);
      })
      .map((element) => element.querySelector('a'));
  }
  /**
     * @param {Function} condition Condition to wait for (must return truty/falsy)
     * @param {Function} callback Callback to run when the condition is met
     * @param {number} opt_timeout Optoinal timeout, defaults to 8000
     * @return {void}
     */
  function waitFor(condition, callback, opt_timeout) {
    var stop = false;
    // eslint-disable-next-line no-param-reassign
    timeout = typeof opt_timeout === 'undefined' ? 8000 : opt_timeout;
    window.setTimeout(function () {
      stop = true;
    }, timeout);
    // eslint-disable-next-line consistent-return
    return function innerWaitFor() {
      if (condition()) return callback();
      if (stop) return null;
      window.setTimeout(innerWaitFor, 50);
    };
  }
  // Get all accordion items
  const accordionItems = document.querySelectorAll('.mt-accordion-item');

  // Function to update 'any-expanded' class on relevant elements
  function updateAnyExpandedClass() {
    // Check if any accordion item has the 'expanded' class
    const anyExpanded = Array.from(accordionItems).some((item) => item.classList.contains('expanded'));

    // Select elements with IDs starting with 'mt-slider' and their 'li' elements
    const elements = document.querySelectorAll('[id^=mt-slider] li');

    // Toggle the class on each matching element based on the presence of 'expanded' class
    elements.forEach(function (element) {
      if (anyExpanded) {
        element.classList.add('any-expanded');
      } else {
        element.classList.remove('any-expanded');
      }
    });
  }

  // Initialize the 'any-expanded' class based on the initial state
  updateAnyExpandedClass();

  // Loop through each accordion item and add event listener
  accordionItems.forEach(function (item) {
    const header = item.querySelector('.mt-accordion-header');
    const content = item.querySelector('.mt-accordion-content');

    // Add click event listener to the header
    header.addEventListener('click', function () {
      // Toggle the 'expanded' class on the accordion item
      item.classList.toggle('expanded');

      // Update the 'any-expanded' class on relevant elements
      updateAnyExpandedClass();

      // Toggle the display of the content
      if (content.style.display === 'block') {
        content.style.display = 'block';
      } else {
        content.style.display = 'block';
      }
    });
  });



</script>
