<!-- Deals Days Banner -->

<script>
    (function () {
        const banner = document.getElementById('deals-days-banner');

        if (!banner || banner.dataset.timerInitialized === 'true') {
            return;
        }

        banner.dataset.timerInitialized = 'true';

        const countdownEl = banner.querySelector('[data-countdown]');
        const endTime = new Date('2026-05-06T23:59:59-05:00').getTime();

        function formatUnit(value) {
            return String(Math.max(0, value)).padStart(2, '0');
        }

        function updateCountdown() {
            const distance = endTime - Date.now();

            if (!countdownEl) {
                return;
            }

            if (distance <= 0) {
                countdownEl.textContent = '00d 00h 00m 00s';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countdownEl.textContent = [
                formatUnit(days) + 'd',
                formatUnit(hours) + 'h',
                formatUnit(minutes) + 'm',
                formatUnit(seconds) + 's'
            ].join(' ');
        }

        updateCountdown();
        window.setInterval(updateCountdown, 1000);
    })();
</script>
