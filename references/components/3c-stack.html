<script>
document.addEventListener("DOMContentLoaded", function () {

    /* ── NBA video: IntersectionObserver auto-play (once + one replay) ── */
    (function initNbaVideo() {
        var card  = document.getElementById("tffNbaCard");
        var video = document.getElementById("tffNbaVideo");
        var btn   = document.getElementById("tffNbaBtn");
        var icon  = document.getElementById("tffNbaIcon");

        if (!card || !video || !btn || !icon) return;

        var playIconUrl  = "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltfb7f6e5f516cd86b/68dbe6f04983061fa4f367e1/button_play_default.svg";
        var pauseIconUrl = "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltbb12959797e4cc5a/68dbe6f05b98db396064ec16/button_pause_default.svg";

        var hasAutoPlayedOnce     = false;
        var hasExitedAfterAutoPlay = false;
        var hasAutoReplayedOnce   = false;

        function setIcon(isPaused) {
            icon.src = isPaused ? playIconUrl : pauseIconUrl;
            icon.alt = isPaused ? "Play video" : "Pause video";
            btn.setAttribute("aria-label", isPaused ? "Play video" : "Pause video");
        }

        function playFromStart() {
            try { video.currentTime = 0; } catch (e) {}
            video.play().then(function () { setIcon(false); }).catch(function () { setIcon(true); });
        }

        function pauseVideo() {
            if (!video.paused) video.pause();
            setIcon(true);
        }

        video.addEventListener("ended", function () { setIcon(true); });
        video.addEventListener("pause", function () { setIcon(true); });
        video.addEventListener("play",  function () { setIcon(false); });

        btn.addEventListener("click", function (e) {
            e.preventDefault();
            e.stopPropagation();
            if (video.paused) {
                var nearEnd = video.duration && video.currentTime >= Math.max(0, video.duration - 0.05);
                if (video.ended || nearEnd) {
                    playFromStart();
                } else {
                    video.play().then(function () { setIcon(false); }).catch(function () { setIcon(true); });
                }
            } else {
                pauseVideo();
            }
        });

        var nbaObserver = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                    if (!hasAutoPlayedOnce) {
                        hasAutoPlayedOnce = true;
                        playFromStart();
                        return;
                    }
                    if (hasExitedAfterAutoPlay && !hasAutoReplayedOnce) {
                        hasAutoReplayedOnce = true;
                        playFromStart();
                        return;
                    }
                } else {
                    if (hasAutoPlayedOnce) hasExitedAfterAutoPlay = true;
                    pauseVideo();
                }
            });
        }, { threshold: 0 });

        setIcon(false);
        nbaObserver.observe(card);
    })();

    /* ── NHL video: immediate auto-play on load ── */
    (function initNhlVideo() {
        var card  = document.getElementById("tffNhlCard");
        var video = document.getElementById("tffNhlVideo");
        var btn   = document.getElementById("tffNhlBtn");
        var icon  = document.getElementById("tffNhlIcon");

        if (!card || !video || !btn || !icon) return;

        var playIconUrl  = "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltfb7f6e5f516cd86b/68dbe6f04983061fa4f367e1/button_play_default.svg";
        var pauseIconUrl = "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltbb12959797e4cc5a/68dbe6f05b98db396064ec16/button_pause_default.svg";

        function setIcon(isPaused) {
            icon.src = isPaused ? playIconUrl : pauseIconUrl;
            icon.alt = isPaused ? "Play video" : "Pause video";
            btn.setAttribute("aria-label", isPaused ? "Play video" : "Pause video");
        }

        function playFromStart() {
            try { video.currentTime = 0; } catch (e) {}
            video.play().then(function () { setIcon(false); }).catch(function () { setIcon(true); });
        }

        video.addEventListener("ended", function () { setIcon(true); });
        video.addEventListener("pause", function () { setIcon(true); });
        video.addEventListener("play",  function () { setIcon(false); });

        video.play().then(function () { setIcon(false); }).catch(function () { setIcon(true); });

        btn.addEventListener("click", function (e) {
            e.preventDefault();
            e.stopPropagation();
            if (video.paused) {
                var nearEnd = video.duration && video.currentTime >= Math.max(0, video.duration - 0.05);
                if (video.ended || nearEnd) {
                    playFromStart();
                } else {
                    video.play().then(function () { setIcon(false); }).catch(function () { setIcon(true); });
                }
            } else {
                if (!video.paused) video.pause();
                setIcon(true);
            }
        });
    })();

});
</script>
