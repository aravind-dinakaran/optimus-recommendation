<script>
(function () {
    const desktopUrl = 'https://assets.contentstack.io/v3/assets/blt964243cdd7810dea/blt749e3f4ce20ce924/69e68bd508120b56c414df8b/banner_pitboss.mp4';
    const mobileUrl  = 'https://assets.contentstack.io/v3/assets/blt964243cdd7810dea/blt401357a110f8ae9b/69e68bd5fe17be4768f7f0af/banner_pitboss-m.mp4';
    const maxPlayCount = 1;

    const playIconUrl  = 'https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltfb7f6e5f516cd86b/68dbe6f04983061fa4f367e1/button_play_default.svg';
    const pauseIconUrl = 'https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltbb12959797e4cc5a/68dbe6f05b98db396064ec16/button_pause_default.svg';

    const wrap  = document.getElementById('wtw-video-section');
    const video = document.getElementById('wtwVideo');
    const btn   = document.getElementById('wtwVideoBtn');
    const icon  = document.getElementById('wtwVideoIcon');

    let isPlaying = false;
    let currentUrl = null;
    let completedPlayCount = 0;
    let hasEnteredViewport = false;
    let hasExitedViewportAfterEntry = false;

    function canPlayAgain() {
        return completedPlayCount < maxPlayCount;
    }

    function getUrl() {
        return window.innerWidth < 768 ? mobileUrl : desktopUrl;
    }

    function setIcon(playing) {
        if (playing) {
            icon.src = pauseIconUrl;
            icon.alt = 'Pause';
            btn.setAttribute('aria-label', 'Pause video');
        } else {
            icon.src = playIconUrl;
            icon.alt = 'Play';
            btn.setAttribute('aria-label', 'Play video');
        }
    }

    function startVideo() {
        if (!canPlayAgain()) {
            pauseVideo();
            return;
        }
        const newUrl = getUrl();
        if (newUrl !== currentUrl) {
            currentUrl = newUrl;
            video.src = currentUrl;
            video.load();
        }
        video.play().catch(function () {});
        isPlaying = true;
        setIcon(true);
    }

    function pauseVideo() {
        video.pause();
        isPlaying = false;
        setIcon(false);
    }

    function updateSource() {
        const newUrl = getUrl();
        if (newUrl === currentUrl) return;
        currentUrl = newUrl;
        video.src = currentUrl;
        video.load();
        if (isPlaying) {
            video.play().catch(function () {});
        }
    }

    let resizeTimer;
    window.addEventListener('resize', function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(updateSource, 50);
    });

    btn.addEventListener('click', function (e) {
        e.preventDefault();
        e.stopPropagation();
        if (isPlaying) {
            pauseVideo();
        } else {
            completedPlayCount = 0;
            startVideo();
        }
    });

    video.addEventListener('ended', function () {
        completedPlayCount += 1;
        isPlaying = false;
        setIcon(false);
    });

    const observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
            var visible = entry.isIntersecting && entry.intersectionRatio >= 0.25;
            if (visible) {
                if (!hasEnteredViewport) {
                    hasEnteredViewport = true;
                    startVideo();
                    return;
                }
                if (hasExitedViewportAfterEntry) {
                    startVideo();
                    return;
                }
            } else {
                if (hasEnteredViewport) hasExitedViewportAfterEntry = true;
                if (isPlaying) pauseVideo();
            }
        });
    }, { threshold: [0, 0.25] });

    // Set src immediately so the element has natural dimensions before
    // the IntersectionObserver fires (a 0-height element never reaches
    // the 0.25 threshold, so play() would never be called otherwise).
    currentUrl = getUrl();
    video.src = currentUrl;

    setIcon(true);
    observer.observe(wrap);
})();
</script>
