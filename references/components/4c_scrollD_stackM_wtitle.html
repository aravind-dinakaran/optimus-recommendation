    <script>

        document.addEventListener("DOMContentLoaded", function () {

            // Update Carousel ID for every new component.
            const CAROUSEL_ID = "scrollable-container-new-finds";

            const PREV_BTN_ID = "slider-prev";
            const NEXT_BTN_ID = "slider-next";

            function calculateScrollAmount(carouselContainer) {
                const cardWidth = carouselContainer.querySelector(".scrollable-card").offsetWidth + 14 + 1;
                const visibleCards = window.innerWidth > 768 ? 5 : 1;
                return cardWidth * visibleCards;
            }

            // let scrollAmount = calculateScrollAmount(carouselContainer);s



            // Initially hide the previous button
            // prevButton.style.display = "none";

            // Update button visibility based on the scroll position
            const updateButtonVisibility = function (carouselContainer, prevButton, nextButton) {
                const maxScrollLeft = carouselContainer.scrollWidth - carouselContainer.clientWidth;
                if (window.innerWidth > 768) {
                    prevButton.style.display = carouselContainer.scrollLeft > 0 ? "block" : "none";
                    nextButton.style.display = carouselContainer.scrollLeft < (maxScrollLeft - 1) ? "block" : "none";
                } else {
                    prevButton.style.display = "none";
                    nextButton.style.display = "none";
                }
            }

            // Scroll to the next set of cards
            window.scrollNext = function (nextButton) {
                const carouselContainer = nextButton.parentElement;
                const prevButton = carouselContainer.querySelector(`#${PREV_BTN_ID}`);
                const scrollAmount = calculateScrollAmount(carouselContainer);
                carouselContainer.scrollBy({ left: scrollAmount, behavior: "smooth" });
                updateButtonVisibility(carouselContainer, prevButton, nextButton);
            };

            // Scroll to the previous set of cards
            window.scrollPrev = function (prevButton) {
                const carouselContainer = prevButton.parentElement;
                const nextButton = carouselContainer.querySelector(`#${NEXT_BTN_ID}`);
                const scrollAmount = calculateScrollAmount(carouselContainer);
                carouselContainer.scrollBy({ left: -scrollAmount, behavior: "smooth" });
                updateButtonVisibility(carouselContainer, prevButton, nextButton);
            };

            // Update scrollAmount on resize
            window.addEventListener("resize", () => {
                const carouselContainer = document.getElementById(CAROUSEL_ID);
                const scrollAmount = calculateScrollAmount(carouselContainer);
                updateButtonVisibility(carouselContainer, prevButton, nextButton);
            });

            // Listen for scroll events to update button visibility
            // carouselContainer.addEventListener("scroll", updateButtonVisibility(carouselContainer, prevButton, nextButton));

            const carouselContainer = document.getElementById(CAROUSEL_ID);
            const prevButton = carouselContainer.querySelector(`#${PREV_BTN_ID}`);
            const nextButton = carouselContainer.querySelector(`#${NEXT_BTN_ID}`);

            carouselContainer.addEventListener("scroll", function () {
                updateButtonVisibility(carouselContainer, prevButton, nextButton);
            })

            // Initial check for button visibility
            updateButtonVisibility(carouselContainer, prevButton, nextButton);

            // heydude Video Logic
            const video = document.getElementById('heydudeVideo');
            const btn = document.getElementById('heydudeVideoBtn');
            const icon = document.getElementById('heydudeVideoIcon');

            if (video && btn && icon) {
                const playIcon = "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltfd070f14e896e870/6842e96d02d90175171f6697/button_play.svg";
                const pauseIcon = "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/blt73b099796aae9bb0/6842e96d3c2a3767a9e1f73e/button_pause.svg";

                let isPlaying = true; // Default to auto-playing
                let loopCount = 0;
                const MAX_LOOPS = 4;

                // Helper to update icon
                function updateIcon() {
                    if (video.paused) {
                        icon.src = playIcon;
                        icon.alt = "Play Video";
                    } else {
                        icon.src = pauseIcon;
                        icon.alt = "Pause Video";
                    }
                }

                // Handle video end for looping logic
                video.addEventListener('ended', () => {
                    loopCount++;
                    if (loopCount < MAX_LOOPS) {
                        video.play().catch(() => { });
                    } else {
                        isPlaying = false;
                        updateIcon();
                    }
                });

                // Initial play attempt
                video.play().catch(() => {
                    isPlaying = false;
                    updateIcon();
                });

                // Toggle play/pause
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();

                    if (video.paused) {
                        loopCount = 0; // Reset loop count on manual play
                        video.play();
                        isPlaying = true;
                    } else {
                        video.pause();
                        isPlaying = false;
                    }
                    updateIcon();
                });

                // Pause when out of view
                // const observer = new IntersectionObserver((entries) => {
                //   entries.forEach(entry => {
                //     if (!entry.isIntersecting && !video.paused) {
                //       video.pause();
                //     } else if (entry.isIntersecting && isPlaying && video.paused) {
                //       video.play().catch(() => { });
                //     }
                //     updateIcon();
                //   });
                // }, {
                //   threshold: 0.5
                // });
                // observer.observe(video);
            }

            // HydroJug video logic:
            // - Auto-plays once when >= 25% visible
            // - Replays once when it leaves and later becomes >= 25% visible again
            (function initHydroJugVideo() {
                const hydroCard = document.getElementById('new_hydrojug');
                const hydroVideo = document.getElementById('hydrojugVideo');
                const hydroBtn = document.getElementById('hydrojugVideoBtn');
                const hydroIcon = document.getElementById('hydrojugVideoIcon');

                if (!hydroCard || !hydroVideo || !hydroBtn || !hydroIcon) return;

                const playIconUrl =
                    "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltfb7f6e5f516cd86b/68dbe6f04983061fa4f367e1/button_play_default.svg";
                const pauseIconUrl =
                    "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltbb12959797e4cc5a/68dbe6f05b98db396064ec16/button_pause_default.svg";

                let hasAutoPlayedOnce = false;
                let hasExitedAfterAutoPlay = false;
                let hasAutoReplayedOnce = false;

                function setIcon(isPaused) {
                    if (isPaused) {
                        hydroIcon.src = playIconUrl;
                        hydroIcon.alt = "Play video";
                        hydroBtn.setAttribute("aria-label", "Play video");
                    } else {
                        hydroIcon.src = pauseIconUrl;
                        hydroIcon.alt = "Pause video";
                        hydroBtn.setAttribute("aria-label", "Pause video");
                    }
                }

                function playFromStart() {
                    try {
                        hydroVideo.currentTime = 0;
                    } catch (e) { }
                    hydroVideo.play().then(() => setIcon(false)).catch(() => setIcon(true));
                }

                function pauseVideo() {
                    if (!hydroVideo.paused) hydroVideo.pause();
                    setIcon(true);
                }

                // Keep icon in sync (e.g., when video ends).
                hydroVideo.addEventListener("ended", () => setIcon(true));
                hydroVideo.addEventListener("pause", () => setIcon(true));
                hydroVideo.addEventListener("play", () => setIcon(false));

                // Toggle play/pause without navigating the card link.
                hydroBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    e.stopPropagation();

                    if (hydroVideo.paused) {
                        const nearEnd =
                            hydroVideo.duration &&
                            hydroVideo.currentTime >= Math.max(0, hydroVideo.duration - 0.05);
                        if (hydroVideo.ended || nearEnd) {
                            playFromStart();
                        } else {
                            hydroVideo.play().then(() => setIcon(false)).catch(() => setIcon(true));
                        }
                    } else {
                        pauseVideo();
                    }
                });

                // Auto-play logic based on card visibility.
                const hydroObserver = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((entry) => {
                            const isAtLeastQuarterVisible =
                                entry.isIntersecting && entry.intersectionRatio >= 0.25;

                            if (isAtLeastQuarterVisible) {
                                if (!hasAutoPlayedOnce) {
                                    hasAutoPlayedOnce = true;
                                    playFromStart();
                                    return;
                                }

                                if (hasExitedAfterAutoPlay && !hasAutoReplayedOnce) {
                                    hasAutoReplayedOnce = true;
                                    playFromStart();
                                    return;
                                }
                            } else {
                                // Consider "moved out of viewport" once it drops below the 25% threshold.
                                if (hasAutoPlayedOnce) hasExitedAfterAutoPlay = true;
                                pauseVideo();
                            }
                        });
                    },
                    { threshold: [0, 0.25] }
                );

                // Default icon assumes autoplay will start; observer will correct it if autoplay fails.
                setIcon(false);
                hydroObserver.observe(hydroCard);
            })();
        })
    </script>
