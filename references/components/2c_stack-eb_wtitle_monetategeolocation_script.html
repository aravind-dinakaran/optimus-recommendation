    </template>

    <script>
        /**
     * Monetate Action Script (Gulf Coast states: TX / LA / MS / AL)
     * Goal: Clone BOTH #crawfish-card and #mardi-gras-card templates and append them
     * under #trending-near-you .ocd-card-grid.
     *
     * Notes:
     * - Geo targeting is handled by Monetate "where" clause; this script only manipulates DOM.
     * - Script is idempotent: it removes previously-inserted clones before inserting again.
     */
            (function trendingNearYouGeoGulfCoast() {
                console.log("trendingNearYouGeo - TX-LA-MS-AL");
                const ROOT_ID = "trending-near-you";
                const GRID_SELECTOR = ".ocd-card-grid";
                const TEMPLATE_IDS = ["crawfish-card-tx-la-ms-al", "mardi-gras-card"];
                const INSERTED_ATTR = "data-monetate-trending-near-you";
                const INSERTED_VAL = "geo-gulf-coast";
                const SKELETON_ATTR = "data-monetate-trending-near-you-skeleton";
                const STYLE_ID = "monetate-tny-skeleton-styles";

                function nowMs() {
                    return Date.now();
                }

                function waitFor(getter, timeoutMs) {
                    return new Promise((resolve) => {
                        const start = nowMs();
                        const initial = getter();
                        if (initial) return resolve(initial);

                        const obs = new MutationObserver(() => {
                            const val = getter();
                            const expired = nowMs() - start > timeoutMs;
                            if (val || expired) {
                                obs.disconnect();
                                resolve(val || null);
                            }
                        });

                        obs.observe(document.documentElement, { childList: true, subtree: true });

                        // Hard timeout (safety)
                        window.setTimeout(() => {
                            obs.disconnect();
                            resolve(getter() || null);
                        }, timeoutMs);
                    });
                }

                function getRoot() {
                    return document.getElementById(ROOT_ID);
                }

                function getGrid(rootEl) {
                    return rootEl ? rootEl.querySelector(GRID_SELECTOR) : null;
                }

                function removePreviouslyInserted(gridEl) {
                    if (!gridEl) return;
                    gridEl.querySelectorAll(`[${INSERTED_ATTR}="${INSERTED_VAL}"]`).forEach((el) => el.remove());
                    gridEl.querySelectorAll(`[${SKELETON_ATTR}="${INSERTED_VAL}"]`).forEach((el) => el.remove());
                }

                function ensureSkeletonStyles() {
                    if (document.getElementById(STYLE_ID)) return;
                    const style = document.createElement("style");
                    style.id = STYLE_ID;
                    style.textContent = `
          /* Monetate Trending Near You - Skeleton/Shimmer */
          .monetate-tny-skeleton {
            position: relative;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: #E8E8E8;
          }
          .monetate-tny-skeleton::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(90deg, rgba(232,232,232,0) 0%, rgba(245,245,245,0.9) 50%, rgba(232,232,232,0) 100%);
            background-size: 200% 100%;
            animation: monetateTnyShimmer 1.25s ease-in-out infinite;
          }
          .monetate-tny-skeleton-aspect {
            aspect-ratio: 16 / 9;
          }
          @keyframes monetateTnyShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
          }
          @media (prefers-reduced-motion: reduce) {
            .monetate-tny-skeleton::before { animation: none; }
          }
        `;
                    document.head.appendChild(style);
                }

                function createSkeletonCard() {
                    const el = document.createElement("div");
                    el.className = "monetate-tny-skeleton monetate-tny-skeleton-aspect";
                    el.setAttribute(SKELETON_ATTR, INSERTED_VAL);
                    el.setAttribute("aria-hidden", "true");
                    return el;
                }

                async function cloneTemplateRootElement(templateId, timeoutMs) {
                    const templateEl = await waitFor(() => document.getElementById(templateId), timeoutMs);
                    if (!templateEl) return null;

                    // Prefer template.content (spec-compliant)
                    const templateRoot =
                        (templateEl.content && templateEl.content.firstElementChild) || templateEl.firstElementChild;
                    if (!templateRoot) return null;

                    return templateRoot.cloneNode(true);
                }

                async function init() {
                    const rootEl = await waitFor(getRoot, 8000);
                    const gridEl = await waitFor(() => getGrid(rootEl), 8000);
                    if (!gridEl) return;

                    removePreviouslyInserted(gridEl);

                    ensureSkeletonStyles();

                    // Insert skeletons first (one per card), then replace them as clones become available
                    const skeletons = TEMPLATE_IDS.map(() => {
                        const sk = createSkeletonCard();
                        gridEl.appendChild(sk);
                        return sk;
                    });

                    for (let i = 0; i < TEMPLATE_IDS.length; i++) {
                        const templateId = TEMPLATE_IDS[i];
                        const skeleton = skeletons[i];

                        const cloned = await cloneTemplateRootElement(templateId, 8000);
                        if (!cloned) {
                            skeleton.remove();
                            continue;
                        }

                        // Mark so we can remove on re-run
                        if (cloned.setAttribute) {
                            cloned.setAttribute(INSERTED_ATTR, INSERTED_VAL);
                        }

                        skeleton.replaceWith(cloned);
                    }
                }

                if (document.readyState === "loading") {
                    document.addEventListener("DOMContentLoaded", init, { once: true });
                } else {
                    init();
                }
            })();

        

    </script>
