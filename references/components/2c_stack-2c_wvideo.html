<script>
(function () {
    const mobileUrl  = 'https://images.contentstack.io/v3/assets/blt964243cdd7810dea/blt99831857a5758f5a/69c45aa6aa4cbe216b833064/baseball_fans-m2.gif';
    const desktopUrl = 'https://images.contentstack.io/v3/assets/blt964243cdd7810dea/blt0cab133779e6a048/69c4587f593018e0e1eb3267/2card_1_mlbopeningday.gif';

    const playIconUrl  = "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltfb7f6e5f516cd86b/68dbe6f04983061fa4f367e1/button_play_default.svg";
    const pauseIconUrl = "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltbb12959797e4cc5a/68dbe6f05b98db396064ec16/button_pause_default.svg";

    const card   = document.getElementById('tff-mlbopeningday');
    const gif    = document.getElementById('tffMlbGif');
    const canvas = document.getElementById('tffMlbCanvas');
    const btn    = document.getElementById('tffMlbVideoBtn');
    const icon   = document.getElementById('tffMlbVideoIcon');
    const ctx    = canvas.getContext('2d');

    let isPlaying = false;
    let currentUrl = null;
    let hasAutoPlayedOnce = false;
    let hasExitedAfterAutoPlay = false;
    let hasAutoReplayedOnce = false;

    function getUrl() {
        return window.innerWidth < 768 ? mobileUrl : desktopUrl;
    }

    function updateSource() {
        const newUrl = getUrl();
        if (newUrl === currentUrl) return;
        currentUrl = newUrl;
        if (isPlaying) startGif();
    }

    let resizeTimer;
    window.addEventListener('resize', function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(updateSource, 50);
    });

    function setIcon(playing) {
        if (playing) {
            icon.src = pauseIconUrl;
            icon.alt = "Pause";
            btn.setAttribute("aria-label", "Pause video");
        } else {
            icon.src = playIconUrl;
            icon.alt = "Play";
            btn.setAttribute("aria-label", "Play video");
        }
    }

    function freezeFrame() {
        canvas.width  = gif.naturalWidth  || gif.width;
        canvas.height = gif.naturalHeight || gif.height;
        try { ctx.drawImage(gif, 0, 0, canvas.width, canvas.height); } catch(e) {}
        gif.style.display    = 'none';
        canvas.style.display = 'block';
    }

    function startGif() {
        canvas.style.display = 'none';
        gif.style.display    = 'block';
        gif.src = currentUrl + '?t=' + Date.now();
        isPlaying = true;
        setIcon(true);
    }

    function pauseGif() {
        freezeFrame();
        gif.src = '';
        isPlaying = false;
        setIcon(false);
    }

    btn.addEventListener('click', function (e) {
        e.preventDefault();
        e.stopPropagation();
        if (isPlaying) { pauseGif(); } else { startGif(); }
    });

    const observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
            var visible = entry.isIntersecting && entry.intersectionRatio >= 0.25;

            if (visible) {
                if (!hasAutoPlayedOnce) {
                    hasAutoPlayedOnce = true;
                    currentUrl = getUrl();
                    startGif();
                    return;
                }
                if (hasExitedAfterAutoPlay && !hasAutoReplayedOnce) {
                    hasAutoReplayedOnce = true;
                    startGif();
                    return;
                }
            } else {
                if (hasAutoPlayedOnce) hasExitedAfterAutoPlay = true;
                if (isPlaying) pauseGif();
            }
        });
    }, { threshold: [0, 0.25] });

    setIcon(true);
    currentUrl = getUrl();
    observer.observe(card);
})();
</script>
