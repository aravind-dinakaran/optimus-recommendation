    }

    #magellan-activity-cards .magellan-activity-title {
        color: #000;

    #magellan-activity-cards .magellan-activity-card:hover .magellan-activity-title {

    @media (max-width: 767px) {

            aspect-ratio: 343 / 200;
        }

        #magellan-activity-cards .magellan-activity-title {
            font-size: 16px;
        }
    }
</style>
