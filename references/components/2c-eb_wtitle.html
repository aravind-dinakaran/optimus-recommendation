    <style>
        #lets-play-ball {
            --text-card-title: clamp(16px, 1.69vw, 28px);

            --text-card-disclaimer: clamp(14px, 1.33vw, 22px);
            --text-card-cta: clamp(14px, 1.33vw, 22px);
        }

        #lets-play-ball .text-card-title {
            font-size: var(--text-card-title, clamp(16px, 1.69vw, 28px));
        }

        #lets-play-ball .text-card-kicker {
            font-size: var(--text-card-kicker, clamp(12px, 1.33vw, 22px));

        #lets-play-ball .text-card-disclaimer {

            font-size: var(--text-card-cta, clamp(14px, 1.33vw, 22px));
            text-decoration: underline;
        }

        #lets-play-ball .headline-svg {
            height: clamp(36px, 2.5vw, 53px);
        }

        .ocd-card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .grid-card-wide {
            grid-column: 1 / -1;
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .svg-lets-play-ball {
            width: clamp(207px, 30.37vw, 503px);
        }

            .ocd-card-grid {
