<script>
    const playPauseBtn = document.getElementById("playPauseBtn");
    const playPauseIcon = playPauseBtn.querySelector(".play-pause-icon");

    const pauseSrc =
        "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltbb12959797e4cc5a/68dbe6f05b98db396064ec16/button_pause_default.svg";
    const playSrc =
        "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltfb7f6e5f516cd86b/68dbe6f04983061fa4f367e1/button_play_default.svg";

    let isPaused = false;

    // Get Bootstrap carousel instance
    const sliderEl = document.getElementById("defaultSlider");
    const bsCarousel = new bootstrap.Carousel(sliderEl, {
        interval: 5000,
        ride: "carousel",
    });

    playPauseBtn.addEventListener("click", () => {
        isPaused = !isPaused;

        if (isPaused) {
            bsCarousel.pause();
            playPauseIcon.src = playSrc;
        } else {
            bsCarousel.cycle(); // resume autoplay without jumping a slide
            playPauseIcon.src = pauseSrc;
        }
    });
</script>

<!-- COUNTDOWN Script -->
<script>
    // Target: April 2, 2026 at 00:00 CST
    const endTime3 = new Date("2026-04-02T00:00:00-05:00");

    function updateCountdown() {
        const now = new Date().getTime();
        const distance = endTime3 - now;

        const el = document.querySelector(".sitewidecountdown");

        if (distance <= 0) {
            el.textContent = "00h";
            return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor(
            (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        );
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        const mm = minutes < 10 ? "0" + minutes : minutes;
        const ss = seconds < 10 ? "0" + seconds : seconds;

        let output = "";

        // Show days only if >= 1
        if (days >= 1) output += `${days}d `;

        // Show hours only if > 0
        if (hours > 0) output += `${hours}h `;

        // Show minutes only if > 0
        if (minutes > 0) output += `${mm}m `;

        // Show seconds only if hours are not showing
        if (hours === 0 && seconds > 0) output += `${ss}s `;

        /*output += "LEFT TO SAVE | ONLINE + IN-STORE";*/

        el.textContent = output.trim();
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>
