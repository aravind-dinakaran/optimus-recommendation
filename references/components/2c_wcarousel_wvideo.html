<style>
	.right-static-container {
		text-align: center;
		width: 100%
	}

	.right-static {
		display: flex;
		gap: 1.5rem;
		height: 100%;
	}

	.slider-wrapper {
		gap: 1.5vw;
		display: flex;
	}

	@media (max-width:767px) {
		.right-static {
			height: auto;
			width: 100%;
			gap: 1rem;
			overflow-x: auto;
			scroll-behavior: smooth;
			-webkit-overflow-scrolling: touch;
		}

		.slider-wrapper {
			gap: 1.5vw;
			display: block;
			/*width: calc(100% - 2rem);*/
		}

		.right-static::-webkit-scrollbar {
			display: none;
		}
	}



	/*Slider Styles*/
	/* Force the carousel to always fill its flex column immediately */
	.slider {
		width: 100%;
		aspect-ratio: 816 / 600;

	}

	/* Lock the inner container to a stable aspect ratio */
	.slider .carousel-inner {
		width: 100%;
		aspect-ratio: 816 / 550;
		/* adjust as needed */
		overflow: hidden;
	}

	/* Ensure slides fill the box */
	.slider .carousel-item {
		height: 100%;
		position: relative;
	}

	/* Prevent natural-size flash */
	/*.slider .carousel-item img {*/
	.slider-img {
		width: 100%;
		height: 100%;
		object-fit: cover;
		display: block;
	}

	.slider {
		border: 1px solid #cccccc;
		display: flex;
		flex-direction: column;
		justify-content: space-evenly;
		/* match your layout */
	}

	.wk14-slide-link {
		display: block;
		width: 100%;
		height: 100%;
		position: relative;
	}

	.wk14-slide-link img {
		position: absolute;
		top: 50%;
		left: 50%;
		width: 100%;
		height: 100%;
		object-fit: contain;
		transform: translate(-50%, calc(-50% - clamp(20px, 2.62vw, 60px)/2));
	}

	.slide-video {
		position: absolute;
		inset: 0;
		width: 100%;
		height: 100%;
		object-fit: cover;
		z-index: 0;
		background: #000000;
	}

	.wk14-slide-content {
		position: relative;
		width: 100%;
		height: 100%;
		overflow: hidden;
		background: #000000;
	}

	.wk14-slide-content picture,
	.wk14-slide-content .wk14-slide-link {
		position: absolute;
		inset: 0;
		display: block;
		width: 100%;
		height: 100%;
	}

	.wk14-slide-content .slider-img {
		position: absolute;
		inset: 0;
		width: 100%;
		height: 100%;
		object-fit: cover;
		transform: none;
	}

	.wk14-slide-overlay-link {
		position: absolute;
		inset: 0;
		z-index: 2;
	}

	.wk14-promo-copy {
		position: absolute;
		top: clamp(16px, 1.45vw, 24px);
		left: clamp(16px, 1.45vw, 24px);
		z-index: 3;
		color: #ffffff;
		font-family: "Roboto Flex", Roboto, Arial, sans-serif;
		line-height: 1.1;
		text-align: left;
		pointer-events: none;
	}

	.wk14-promo-kicker {
		font-size: clamp(16px, 1.45vw, 24px);
		font-weight: 600;
	}

	.wk14-promo-value {
		font-size: clamp(32px, 2.9vw, 48px);
		font-weight: 700;
	}

	.wk14-promo-title {
		font-size: clamp(20px, 1.69vw, 28px);
		font-weight: 700;
	}

	.wk14-slide-overlay-link:hover + .wk14-promo-copy > *,
	.wk14-slide-overlay-link:focus-visible + .wk14-promo-copy > *,
	.wk14-slide-link:hover .wk14-promo-copy > *,
	.wk14-slide-link:focus-visible .wk14-promo-copy > * {
		text-decoration: underline;
		text-underline-offset: 0.12em;
	}

	.indicator-wrapper {
		flex: 1;
		min-height: 27px;
		position: relative;
		display: flex;
		justify-content: space-between;
	}

	.carousel-indicators {
		position: relative;
		margin: 0.25rem;
		display: flex;
		align-items: center;
		justify-content: flex-start;
	}

	.carousel-indicators [data-bs-target] {
		width: 0.75rem;
		height: 0.75rem;
		border-radius: 50%;
		background: #fff;
		border: 2px solid #1946C8;
		margin: 0 0.75rem;
	}

	.carousel-indicators .active {
		background: #1946C8;
		border: 2px solid #1946C8;
	}

	#playPauseBtn {
		border: none;
		background: none;
	}

	.corners-d-top {
		border-radius: 0.5rem 0.5rem 0 0;
	}

	.carousel-cta-group {
		position: absolute;
		left: 50%;
		bottom: clamp(20px, 2.62vw, 60px);
		transform: translateX(-50%);
		display: flex;
		align-items: center;
		justify-content: center;
		gap: clamp(12px, 0.97vw, 16px);
		width: 100%;
		padding: 0 clamp(12px, 1.2vw, 20px);
	}


	.carousel-cta {
		display: inline-flex;
		align-items: center;
		justify-content: center;
		padding: clamp(8px, 0.73vw, 12px) clamp(16px, 1.45vw, 24px);
		border-radius: clamp(4px, 0.48vw, 8px);
		background: #1946c8;
		color: #ffffff;
		font-family: "Open Sans", Arial, sans-serif;
		font-size: clamp(10px, 1.33vw, 22px);
		font-weight: 700;
		line-height: 1;
		text-align: center;
		text-decoration: none;
		text-transform: uppercase;
		white-space: nowrap;
	}

	.carousel-cta:hover,
	.carousel-cta:focus-visible {
		color: #ffffff;
		background: #0f35a8;
		text-decoration: none;
	}


	@media (max-width: 767px) {
		.slider {
			max-width: 100%;
			margin-bottom: 1rem;
			aspect-ratio: 375 / 327;
			min-height: 327px;
		}

		.slider .carousel-inner {
			aspect-ratio: 375 / 300;
			overflow: hidden;
		}

		.slider .carousel-item {
			min-height: 300px;
		}

		.carousel-item .slide-video,
		.carousel-item picture {
			width: 100%;
			height: 100%;
		}

		.corners-d-top {
			border-radius: 0;
		}

		.carousel-cta-group {
			bottom: clamp(18px, 7.47vw, 28px);
			gap: 16px;
			padding: 0 12px;
		}

		.carousel-cta {
			font-size: clamp(8px, 4.26vw, 32px);
			padding: 2.13vw 4.26vw;
			border-radius: 4px;
		}

	}
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
	integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>



<script>
	(function () {
		const sliderEl = document.getElementById('defaultSlider');
		const playPauseBtn = document.getElementById('playPauseBtn');

		if (!sliderEl || !playPauseBtn || typeof bootstrap === 'undefined') {
			return;
		}

		const pauseSrc = "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltbb12959797e4cc5a/68dbe6f05b98db396064ec16/button_pause_default.svg";
		const playSrc = "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltfb7f6e5f516cd86b/68dbe6f04983061fa4f367e1/button_play_default.svg";
		const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
		let isPaused = reduceMotion;

		const bsCarousel = bootstrap.Carousel.getOrCreateInstance(sliderEl, {
			interval: 5000,
			ride: isPaused ? false : 'carousel'
		});

		function setPlayPauseIcon(paused) {
			const icon = playPauseBtn.querySelector('.play-pause-icon');
			const action = paused ? 'Play' : 'Pause';
			const label = action + ' carousel and video';
			if (icon) {
				icon.src = paused ? playSrc : pauseSrc;
				icon.alt = label;
			}
			playPauseBtn.setAttribute('aria-label', label);
		}

		function getActiveSlide() {
			return sliderEl.querySelector('.carousel-item.active');
		}

		function setVideoPaused(video, paused) {
			if (!video) return;

			if (paused) {
				video.pause();
			} else {
				const playPromise = video.play();
				if (playPromise && typeof playPromise.catch === 'function') {
					playPromise.catch(function () {});
				}
			}
		}

		function syncVideos() {
			const activeSlide = getActiveSlide();
			sliderEl.querySelectorAll('video').forEach(function (video) {
				if (activeSlide && activeSlide.contains(video) && !isPaused) {
					setVideoPaused(video, false);
				} else {
					setVideoPaused(video, true);
				}
			});
		}

		if (isPaused) {
			bsCarousel.pause();
		}

		setPlayPauseIcon(isPaused);

		sliderEl.addEventListener('slide.bs.carousel', function () {
			sliderEl.querySelectorAll('video').forEach(function (video) {
				video.pause();
			});
		});

		sliderEl.addEventListener('slid.bs.carousel', syncVideos);

		playPauseBtn.addEventListener('click', function () {
			isPaused = !isPaused;

			if (isPaused) {
				bsCarousel.pause();
			} else {
				bsCarousel.cycle();
			}

			setPlayPauseIcon(isPaused);
			syncVideos();
		});

		syncVideos();
	})();
</script>
