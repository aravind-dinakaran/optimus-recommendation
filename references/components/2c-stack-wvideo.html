<script>
    (function () {
        var gif = document.getElementById("wk16TffWorldCupGif");
        var canvas = document.getElementById("wk16TffWorldCupCanvas");
        var button = document.getElementById("wk16TffWorldCupButton");
        var icon = document.getElementById("wk16TffWorldCupIcon");

        if (!gif || !canvas || !button || !icon) return;

        var ctx = canvas.getContext("2d");
        var gifUrl = "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/blta61543205d314f58/6a03430ddf50bb2c1128fe4d/Frame_2147205276.gif";
        var playIconUrl = "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltfb7f6e5f516cd86b/68dbe6f04983061fa4f367e1/button_play_default.svg";
        var pauseIconUrl = "https://images.contentstack.io/v3/assets/blt964243cdd7810dea/bltbb12959797e4cc5a/68dbe6f05b98db396064ec16/button_pause_default.svg";
        var isPlaying = true;
        var nbaVideo = document.getElementById("wk16TffNbaVideo");
        var nbaButton = document.getElementById("wk16TffNbaButton");
        var nbaIcon = document.getElementById("wk16TffNbaIcon");

        function setButtonState(playing) {
            icon.src = playing ? pauseIconUrl : playIconUrl;
            icon.alt = playing ? "Pause video" : "Play video";
            button.setAttribute("aria-label", playing ? "Pause video" : "Play video");
        }

        function setVideoButtonState(playing) {
            nbaIcon.src = playing ? pauseIconUrl : playIconUrl;
            nbaIcon.alt = playing ? "Pause video" : "Play video";
            nbaButton.setAttribute("aria-label", playing ? "Pause video" : "Play video");
        }

        function freezeFrame() {
            canvas.width = gif.naturalWidth || gif.clientWidth;
            canvas.height = gif.naturalHeight || gif.clientHeight;

            try {
                ctx.drawImage(gif, 0, 0, canvas.width, canvas.height);
            } catch (error) {
                canvas.style.backgroundColor = "#333333";
            }

            gif.style.display = "none";
            canvas.style.display = "block";
        }

        function playGif() {
            canvas.style.display = "none";
            gif.style.display = "block";
            gif.src = gifUrl + "?t=" + Date.now();
            isPlaying = true;
            setButtonState(true);
        }

        function pauseGif() {
            freezeFrame();
            gif.src = "";
            isPlaying = false;
            setButtonState(false);
        }

        button.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();
            if (isPlaying) {
                pauseGif();
            } else {
                playGif();
            }
        });

        setButtonState(true);

        if (!nbaVideo || !nbaButton || !nbaIcon) return;

        nbaVideo.addEventListener("play", function () {
            setVideoButtonState(true);
        });

        nbaVideo.addEventListener("pause", function () {
            setVideoButtonState(false);
        });

        nbaButton.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();

            if (nbaVideo.paused) {
                var playAttempt = nbaVideo.play();
                setVideoButtonState(true);

                if (playAttempt && typeof playAttempt.catch === "function") {
                    playAttempt.catch(function () {
                        setVideoButtonState(false);
                    });
                }
            } else {
                nbaVideo.pause();
                setVideoButtonState(false);
            }
        });

        setVideoButtonState(true);
    })();
</script>
