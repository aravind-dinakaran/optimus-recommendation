        let debounceTimer;

        function getTargetProductCards() {
            return Array.from(document.querySelectorAll(PRODUCT_CARD_SELECTOR)).filter(function (productCard) {
                return TARGET_PRODUCT_IDS.has(productCard.getAttribute("data-productid"));
            });

        function createPromotionElement() {
            const promotion = document.createElement("div");
            promotion.className = "promotion--hfJyc textBodySm fwBold";
            promotion.setAttribute("data-auid", "product-additional-promotion");
            promotion.setAttribute(INSERTED_ATTR, "true");
            promotion.textContent = PROMOTION_TEXT;
            return promotion;
        }

        function placePromotion(productDetails, promotion, existingPromotions) {
            const lastExistingPromotion = existingPromotions[existingPromotions.length - 1];

            if (lastExistingPromotion) {
                if (lastExistingPromotion.nextElementSibling !== promotion) {
                    lastExistingPromotion.insertAdjacentElement("afterend", promotion);
                }
                return;
            }

            const badgeGroup = productDetails.querySelector(BADGE_GROUP_SELECTOR);

            if (badgeGroup) {
                if (promotion.nextElementSibling !== badgeGroup) {
                    productDetails.insertBefore(promotion, badgeGroup);
                }
                return;
            }

            const price = productDetails.querySelector(PRICE_SELECTOR);

            if (price) {
                if (price.nextElementSibling !== promotion) {
                    price.insertAdjacentElement("afterend", promotion);
                }
                return;
            }

            if (promotion.parentElement !== productDetails || productDetails.lastElementChild !== promotion) {
                productDetails.appendChild(promotion);
            }
        }

        function ensurePromotionPlacement() {
            if (isUpdating) return;
            isUpdating = true;

            getTargetProductCards().forEach(function (productCard) {
                const productDetails = productCard.querySelector(PRODUCT_DETAILS_SELECTOR);

                if (!productDetails) {
                    return;
                }

                const promotions = Array.from(productDetails.querySelectorAll(PROMOTION_SELECTOR));
                const existingPromotions = promotions.filter(function (promotion) {
                    return !promotion.hasAttribute(INSERTED_ATTR);
                });
                const insertedPromotions = promotions.filter(function (promotion) {
                    return promotion.hasAttribute(INSERTED_ATTR);
                });
                const promotion = insertedPromotions[0] || createPromotionElement();

                insertedPromotions.slice(1).forEach(function (duplicate) {
                    duplicate.remove();
                });

                if (promotion.textContent.trim() !== PROMOTION_TEXT) {
                    promotion.textContent = PROMOTION_TEXT;
                }

                promotion.setAttribute("data-auid", "product-additional-promotion");
                promotion.setAttribute(INSERTED_ATTR, "true");
                placePromotion(productDetails, promotion, existingPromotions);
            });

            isUpdating = false;
        }

        function schedulePlacementCheck() {
            window.clearTimeout(debounceTimer);
            debounceTimer = window.setTimeout(ensurePromotionPlacement, DEBOUNCE_MS);
        }

        function init() {
            ensurePromotionPlacement();

            if (window[OBSERVER_KEY]) {
                window[OBSERVER_KEY].disconnect();
            }

            if (document.body && "MutationObserver" in window) {
                const observer = new MutationObserver(schedulePlacementCheck);
                observer.observe(document.body, {
                    childList: true,
                    subtree: true,
                    attributes: true,
                    attributeFilter: ["data-productid"]
                });
                window[OBSERVER_KEY] = observer;
            }

            window.setTimeout(ensurePromotionPlacement, 1000);
            window.setTimeout(ensurePromotionPlacement, 3000);
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", init, { once: true });
        } else {
            init();
        }
