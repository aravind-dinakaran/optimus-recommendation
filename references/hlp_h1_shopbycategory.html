<!-- Script to add "Shop By Category" title to the header -->
<style>
    #shop-by-category .hlp-header h2 {
        margin-bottom: 0px;
    }

    #shop-by-category .hlp-header {
        padding: 0px;
    }
</style>

<script>

    document.addEventListener('DOMContentLoaded', () => {
        (function observerAndReapplyChanges() {
            // console.log('%c[Carhartt HLP] Script Initializing...', 'color: blue; font-weight: bold;');

            const targetHeaderSelector = '.contentVerticalMargin--iU1wb';
            const targetTitleContainerSelector = '.title--uBdU5';
            const newElementId = 'shop-by-category'; // Use an ID for the created element

            let isUpdating = false;
            let debounceTimer;

            // Dynamically creates the "Shop By Category" element
            function createShopByCategoryElement() {
                const shopByCategory = document.createElement('div');
                shopByCategory.id = newElementId;
                shopByCategory.innerHTML = `
                    <div class="cont-1656">
                        <div class="hlp-header" style="padding: 0; margin-bottom: 0;">
                            <h2>Shop By Category</h2>
                        </div>
                    </div>
                `;
                return shopByCategory;
            }

            function applyDOMChanges() {
                // console.log('%c[World Cup Soccer HLP] applyDOMChanges called...', 'color: green; font-weight: bold;');
                if (isUpdating) return;
                isUpdating = true;

                const headerContainer = document.querySelector(targetHeaderSelector);
                const titleContainer = headerContainer ? headerContainer.querySelector(targetTitleContainerSelector) : null;

                if (!titleContainer) {
                    isUpdating = false;
                    return;
                }

                // Check if our element is already in the right place.
                if (titleContainer.querySelector(`#${newElementId}`)) {
                    isUpdating = false;
                    return;
                }

                // If not placed, find the target span to hide it.
                const titleSpan = titleContainer.querySelector('.titleLeftColumn--Z4V1W');

                if (titleSpan) {
                    try {
                        const shopByCategoryElement = createShopByCategoryElement();
                        titleSpan.style.display = 'none';
                        titleContainer.insertBefore(shopByCategoryElement, titleContainer.firstChild);
                        headerContainer.classList.add('pb-2', 'pb-sm-3', 'mb-3', 'cont-1656', 'hp-margin');
                    } catch (error) {
                        console.error(`[World Cup Soccer HLP] Error while inserting shop by category: ${error}`);
                    }
                }

                setTimeout(() => { isUpdating = false; }, 0);
            }

            // Initial check in case the content is already there on page load
            applyDOMChanges();

            // --- Robust Initialization Guard ---
            // Disconnect any previous observer to prevent duplicates.
            if (window.worldcupsoccerCatTilesObserverInstance) {
                window.worldcupsoccerCatTilesObserverInstance.disconnect();
            }

            const observer = new MutationObserver(() => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(applyDOMChanges, 250);
            });

            observer.observe(document.body, {
                childList: true,
                subtree: true
            });

            window.worldcupsoccerCatTilesObserverInstance = observer;

        })();

    });
</script>
