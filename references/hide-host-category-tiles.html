<!-- Hide host category tiles -->
<style>
    .wrapper--hH7mi,
    .contentMargin.contentVerticalMargin--iU1wb {
        display: none !important;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        (function hideCategoryTiles() {
            let debounceTimer;

            function applyHiddenState() {
                document.querySelectorAll('.wrapper--hH7mi, .contentMargin.contentVerticalMargin--iU1wb').forEach((categoryTiles) => {
                    categoryTiles.style.display = 'none';
                    categoryTiles.setAttribute('aria-hidden', 'true');
                });
            }

            applyHiddenState();

            if (window.magellanHideCatTilesObserverInstance) {
                window.magellanHideCatTilesObserverInstance.disconnect();
            }

            const observer = new MutationObserver(() => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(applyHiddenState, 250);
            });

            observer.observe(document.body, {
                childList: true,
                subtree: true
            });

            window.magellanHideCatTilesObserverInstance = observer;
        })();
    });
</script>
