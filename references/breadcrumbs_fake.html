<section id="ssl-breadcrumb-component" data-component="sslBreadCrumb">
    <div class="ssl-breadcrumb__inner cont-1656 hp-margin"></div>
</section>

<script>
    (function initSslBreadcrumb() {
        const root = document.getElementById("ssl-breadcrumb-component");
        const config = window.sslBreadcrumbConfig;
        if (!root || !config || !Array.isArray(config.items) || !config.items.length) return;

        const inner = root.querySelector(".ssl-breadcrumb__inner");
        if (!inner) return;

        if (config.backgroundColor) {
            root.style.setProperty("--ssl-breadcrumb-bg", config.backgroundColor);
        }

        function hideNativeBreadcrumbs() {
            document.querySelectorAll('[data-component="breadCrumb"]').forEach(function (breadcrumb) {
                breadcrumb.style.display = "none";
                breadcrumb.setAttribute("aria-hidden", "true");
            });
        }

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function getAbsoluteUrl(href) {
            try {
                return new URL(href || "/", "https://www.academy.com").href;
            } catch (error) {
                return "https://www.academy.com/";
            }
        }

        function renderSeparator() {
            return [
                '<span class="ssl-breadcrumb__separator" aria-hidden="true">',
                '<svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">',
                '<path d="M8 2L5.15 10H4L6.85 2H8Z" fill="currentColor"></path>',
                '</svg>',
                '</span>'
            ].join("");
        }

        function renderItem(item, index) {
            const label = escapeHtml(item.label);
            const isLast = index === config.items.length - 1;
            const isCurrent = item.current || isLast;
            const content = isCurrent
                ? '<span class="ssl-breadcrumb__current" aria-current="page">' + label + '</span>'
                : '<a class="ssl-breadcrumb__link" href="' + escapeHtml(item.href || "/") + '">' + label + '</a>';

            return '<span class="ssl-breadcrumb__item">' + content + (isLast ? "" : renderSeparator()) + '</span>';
        }

        function renderSchema() {
            const schema = {
                "@context": "https://schema.org",
                "@type": "BreadcrumbList",
                itemListElement: config.items.map(function (item, index) {
                    return {
                        "@type": "ListItem",
                        position: index + 1,
                        item: getAbsoluteUrl(item.href),
                        name: item.label
                    };
                })
            };
            const script = document.createElement("script");
            script.type = "application/ld+json";
            script.text = JSON.stringify(schema);
            root.insertBefore(script, inner);
        }

        inner.innerHTML = '<nav class="ssl-breadcrumb" aria-label="Breadcrumbs" data-auid="' + escapeHtml(config.label || "") + '">' + config.items.map(renderItem).join("") + '</nav>';
        renderSchema();
        hideNativeBreadcrumbs();

        if (document.body && "MutationObserver" in window) {
            new MutationObserver(hideNativeBreadcrumbs).observe(document.body, {
                childList: true,
                subtree: true
            });
        }
    })();
</script>
