        gap: var(--card-gap);
        overflow-x: auto;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
    }

    #magellan-category-cards .scrollable-container::-webkit-scrollbar {
        display: none;
    }

    #magellan-category-cards .scrollable-card {
        flex: 0 0 calc((100% - (var(--card-gap) * 4)) / 5);

        display: block;

        width: 100%;

        max-width: 100%;
        min-width: 0;
        object-fit: cover;
        width: 100% !important;
    }

    #magellan-category-cards .card-subtitle {
        margin-top: var(--card-title-gap);
        padding-top: 0;
        text-align: center;

        text-decoration: underline;
    }

        align-items: center;
        background: transparent;
        border: 0;

    #magellan-category-cards .magellan-category-scroll-btn svg {
        display: block;

        left: 8px;
    }

    #magellan-category-cards .magellan-category-scroll-btn-next {
        right: 8px;

        cursor: default;

<script>
    (function () {
        function initMagellanCategoryScroll() {
            const carousel = document.getElementById("magellan-category-card-container");
            const prevButton = document.getElementById("magellan-category-slider-prev");
            const nextButton = document.getElementById("magellan-category-slider-next");

            if (!carousel || !prevButton || !nextButton) return;

            function isDesktop() {
                return window.innerWidth > 767;
            }

            function getMaxScrollLeft() {
                return carousel.scrollWidth - carousel.clientWidth;
            }

            function updateButtonVisibility() {
                const maxScrollLeft = getMaxScrollLeft();
                const hasDesktopOverflow = isDesktop() && maxScrollLeft > 1;
                const canScrollPrev = hasDesktopOverflow && carousel.scrollLeft > 1;
                const canScrollNext = hasDesktopOverflow && carousel.scrollLeft < maxScrollLeft - 1;

                prevButton.style.display = canScrollPrev ? "flex" : "none";
                nextButton.style.display = canScrollNext ? "flex" : "none";
                prevButton.disabled = !canScrollPrev;
                nextButton.disabled = !canScrollNext;
            }

            function scrollByPage(direction) {
                carousel.scrollBy({
                    left: direction * carousel.clientWidth,
                    behavior: "smooth"
                });
            }

            prevButton.addEventListener("click", function () {
                scrollByPage(-1);
            });

            nextButton.addEventListener("click", function () {
                scrollByPage(1);
            });

            carousel.addEventListener("scroll", updateButtonVisibility);
            window.addEventListener("resize", updateButtonVisibility);

            if ("ResizeObserver" in window) {
                new ResizeObserver(updateButtonVisibility).observe(carousel);
            }

            requestAnimationFrame(updateButtonVisibility);
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", initMagellanCategoryScroll);
        } else {
            initMagellanCategoryScroll();
        }
    })();
</script>
