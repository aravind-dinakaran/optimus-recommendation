    function executePZ() {
        try {
            let userProfileData = localStorage.getItem("aso_userProfileData");
            if (userProfileData && JSON.parse(userProfileData)?.emailId) {
                // Call the globally available function
                if (window.myCustomFunctions && typeof window.myCustomFunctions.implementOnSignIn === 'function') {
                    window.myCustomFunctions.implementOnSignIn();
                } else {
                    console.warn("implementOnSignIn not found or not a function.");
                }
            } else {
                // Call the globally available function
                if (window.myCustomFunctions && typeof window.myCustomFunctions.implementOnSignOut === 'function') {
                    window.myCustomFunctions.implementOnSignOut();
                } else {
                    console.warn("implementOnSignOut not found or not a function.");
                }
            }
        } catch (error) {
            console.log(`Error while executing PZ: ${error}`);
        }
    }

    function applyLocalStorageSetMethod() {
        // Store the original setItem to avoid infinite recursion
        const originalSetItem = Storage.prototype.setItem;

        Storage.prototype.setItem = function (key, newValue) {
            originalSetItem.apply(this, arguments);

            if (window.location.hostname.endsWith('academy.com') && this === window.localStorage && key === 'aso_userProfileData') {
                executePZ();
            }
        };
    }


    executePZ();

    applyLocalStorageSetMethod();
